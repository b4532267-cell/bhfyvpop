<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POP Tube - منصة الفيديوهات التجريبية</title>
    <style>
        /* --- المتغيرات العامة والألوان --- */
        :root {
            --bg-main: #0a0e17;       /* أسود مائل للأزرق الداكن */
            --bg-card: #121824;       /* أزرق غامق للبطاقات */
            --bg-header: #070a10;     /* أسود داكن للهيدر */
            --accent-red: #ff003c;     /* لمسة حمراء احترافية */
            --accent-blue: #00d2ff;    /* أزرق مضيء للتفاعل */
            --text-main: #ffffff;
            --text-muted: #8e9bb0;
            --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* --- التنسيقات الأساسية --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding-top: 80px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* تخصيص شريط التمرير */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-main);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--bg-card);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-red);
        }

        /* --- الهيدر (Header) --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background-color: var(--bg-header);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .logo span {
            color: var(--accent-red);
            text-shadow: 0 0 10px rgba(255, 0, 60, 0.5);
        }

        .search-container {
            flex: 0 1 500px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 10px 20px;
            padding-left: 45px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            color: var(--text-main);
            font-size: 0.95rem;
            transition: var(--transition-smooth);
        }

        .search-container input:focus {
            outline: none;
            border-color: var(--accent-blue);
            background-color: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        .upload-btn {
            background: linear-gradient(135deg, var(--accent-red), #b3002a);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition-smooth);
            box-shadow: 0 4px 15px rgba(255, 0, 60, 0.3);
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 60, 0.5);
        }

        /* --- شبكة الفيديوهات (Video Grid) --- */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            animation: fadeIn 0.8s ease;
        }

        /* --- بطاقة الفيديو (Video Card) --- */
        .video-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: var(--transition-smooth);
            display: flex;
            flex-direction: column;
        }

        .video-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 210, 255, 0.2);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* نسبة 16:9 */
            background-color: #000;
        }

        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-info {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .video-title {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-desc {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 15px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            font-size: 0.8rem;
            color: var(--text-muted);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 12px;
        }

        .actions-left {
            display: flex;
            gap: 12px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
            transition: var(--transition-smooth);
        }

        .action-btn:hover {
            color: var(--text-main);
        }

        .like-btn.liked {
            color: var(--accent-red);
            animation: bounce 0.3s ease;
        }

        .delete-btn:hover {
            color: var(--accent-red);
        }

        /* --- النافذة المنبثقة للرفع (Upload Modal) --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 7, 12, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition-smooth);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: var(--bg-card);
            width: 90%;
            max-width: 500px;
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transform: scale(0.9);
            transition: var(--transition-smooth);
            position: relative;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-group input[type="text"],
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .file-drop-area {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .file-drop-area:hover {
            border-color: var(--accent-blue);
            background-color: rgba(0, 210, 255, 0.02);
        }

        .file-drop-area input[type="file"] {
            display: none;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #0072ff, #00d2ff);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: var(--transition-smooth);
        }

        .submit-btn:hover {
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
        }

        /* تنبيه الحجم والـ Prototype */
        .storage-warning {
            background-color: rgba(255, 0, 60, 0.1);
            border: 1px solid rgba(255, 0, 60, 0.2);
            color: #ff4d79;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        /* --- تأثير التحميل (Loading Spinner) --- */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(18, 24, 36, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 16px;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition-smooth);
            z-index: 10;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-red);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin-bottom: 10px;
        }

        /* --- الأنميشن (Animations) --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        /* --- شاشات الهواتف (Responsive) --- */
        @media (max-width: 768px) {
            header {
                padding: 0 1rem;
            }
            .search-container {
                flex: 0 1 200px;
            }
            .upload-btn span {
                display: none;
            }
            .upload-btn {
                padding: 10px;
                border-radius: 50%;
            }
            .container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- الهيدر الرئيسي للموقع -->
    <header>
        <a href="#" class="logo">POP<span>Tube</span></a>
        
        <div class="search-container">
            <input type="text" id="searchBar" placeholder="ابحث عن فيديو...">
        </div>

        <button class="upload-btn" id="openUploadModal">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
            </svg>
            <span>رفع فيديو</span>
        </button>
    </header>

    <!-- حاوية الفيديوهات الرئيسية -->
    <main class="container">
        <div class="video-grid" id="videoGrid">
            <!-- الفيديوهات سيتم إنشاؤها هنا عبر الجافا سكريبت -->
        </div>
    </main>

    <!-- نافذة رفع الفيديوهات المنبثقة -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal-content">
            <!-- واجهة التحميل عند النشر -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
                <p>جاري نشر الفيديو الخاص بك...</p>
            </div>

            <div class="modal-header">
                <h3>رفع فيديو جديد</h3>
                <button class="close-modal" id="closeUploadModal">&times;</button>
            </div>

            <div class="storage-warning">
                <strong>تنبيه النسخة التجريبية:</strong> نظراً لقيود التخزين في المتصفح المتصفح (localStorage)، سيتم حفظ بيانات الفيديو (العنوان والوصف) دائماً، ولكن ملف الفيديو الفعلي سيعمل حتى تقوم بتحديث الصفحة فقط.
            </div>

            <form id="uploadForm">
                <div class="form-group">
                    <label>اختر ملف الفيديو</label>
                    <div class="file-drop-area" id="dropArea">
                        <span id="fileLabel">اضغط هنا واشترِ ملف فيديو من جهازك</span>
                        <input type="file" id="videoFile" accept="video/*" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>عنوان الفيديو</label>
                    <input type="text" id="videoTitle" placeholder="أدخل عنواناً جذاباً" required>
                </div>

                <div class="form-group">
                    <label>الوصف</label>
                    <textarea id="videoDesc" rows="3" placeholder="اكتب وصفاً مختصراً للفيديو" required></textarea>
                </div>

                <button type="submit" class="submit-btn">نشر الفيديو</button>
            </form>
        </div>
    </div>

    <!-- البرمجة والتفاعل (JavaScript) -->
    <script>
        // --- الفيديوهات الافتراضية (مخزنة بسيرفرات عامة لتبدو الواجهة حية فور التشغيل) ---
        const defaultVideos = [
            {
                id: "default-1",
                title: "تعلّم تصميم واجهات المستخدم الاحترافية بمفهوم الـ Dark Mode",
                desc: "مقطع تجريبي يستعرض تناسق الألوان الداكنة مع اللمسات المضيئة لبناء تجربة مستخدم تخطف الأنظار.",
                videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4",
                likes: 342,
                views: 1205,
                isDefault: true
            },
            {
                id: "default-2",
                title: "مستقبل تطوير الويب الفاشل بدون سيرفرات!",
                desc: "كيف تبني بروتوتايب متكامل الأركان يعتمد كلياً على قدرات المتصفح المحلية المتقدمة.",
                videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4",
                likes: 189,
                views: 840,
                isDefault: true
            }
        ];

        // مصفوفة الجلسة الحالية للاحتفاظ بملفات الفيديو المرفوعة مؤقتاً كـ Blobs
        let sessionVideoFiles = {};

        // الكائنات المستهدفة من واجهة الـ DOM
        const videoGrid = document.getElementById('videoGrid');
        const searchBar = document.getElementById('searchBar');
        const openModalBtn = document.getElementById('openUploadModal');
        const closeModalBtn = document.getElementById('closeUploadModal');
        const modalOverlay = document.getElementById('uploadModal');
        const uploadForm = document.getElementById('uploadForm');
        const dropArea = document.getElementById('dropArea');
        const videoFileInput = document.getElementById('videoFile');
        const fileLabel = document.getElementById('fileLabel');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // --- إدارة الذاكرة والتخزين (LocalStorage) ---
        function getVideosData() {
            const localData = localStorage.getItem('pop_tube_meta');
            if (!localData) {
                localStorage.setItem('pop_tube_meta', JSON.stringify(defaultVideos));
                return defaultVideos;
            }
            return JSON.parse(localData);
        }

        function saveVideosData(data) {
            localStorage.setItem('pop_tube_meta', JSON.stringify(data));
        }

        // --- بناء وعرض بطاقات الفيديو بالموقع ---
        function renderVideos(filterText = '') {
            videoGrid.innerHTML = '';
            const videos = getVideosData();

            const filteredVideos = videos.filter(video => 
                video.title.toLowerCase().includes(filterText.toLowerCase())
            );

            if (filteredVideos.length === 0) {
                videoGrid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 3rem;">لا توجد فيديوهات مطابقة للبحث.</p>`;
                return;
            }

            filteredVideos.forEach(video => {
                // تحديد رابط الفيديو: إذا كان افتراضي نأخذ رابطه، وإذا كان مرفوع نأخذ الـ Blob الحالي أو نضع فيديو افتراضي كبديل بعد التحديث
                let src = video.videoUrl;
                if (!video.isDefault) {
                    src = sessionVideoFiles[video.id] ? sessionVideoFiles[video.id] : "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4";
                }

                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <div class="video-wrapper">
                        <video src="${src}" controls preload="metadata" data-id="${video.id}"></video>
                    </div>
                    <div class="video-info">
                        <h4 class="video-title">${video.title}</h4>
                        <p class="video-desc">${video.desc}</p>
                        <div class="video-stats">
                            <div class="actions-left">
                                <button class="action-btn like-btn" onclick="handleLike('${video.id}')">
                                    ❤️ <span class="like-count">${video.likes}</span>
                                </button>
                                <button class="action-btn delete-btn" onclick="handleDelete('${video.id}')">
                                    🗑️ حذف
                                </button>
                            </div>
                            <span class="view-count">👁️ ${video.views} مشاهدة</span>
                        </div>
                    </div>
                `;
                videoGrid.appendChild(card);
            });

            // تفعيل نظام عداد المشاهدات عند التشغيل لأول مرة
            attachVideoPlayEvents();
        }

        // --- نظام حساب المشاهدات الفريد لكل جلسة تشغيل ---
        function attachVideoPlayEvents() {
            const videoElements = document.querySelectorAll('.video-wrapper video');
            videoElements.forEach(video => {
                video.addEventListener('play', function() {
                    if (!this.dataset.hasPlayed) {
                        this.dataset.hasPlayed = 'true';
                        const id = this.dataset.id;
                        incrementViews(id);
                    }
                });
            });
        }

        function incrementViews(id) {
            let videos = getVideosData();
            const index = videos.findIndex(v => v.id === id);
            if (index !== -1) {
                videos[index].views += 1;
                saveVideosData(videos);
                // تحديث عداد المشاهدة في الواجهة مباشرة بدون رندرة كاملة لتفادي تشنج الفيديو
                const card = document.querySelector(`video[data-id="${id}"]`).closest('.video-card');
                card.querySelector('.view-count').innerText = `👁️ ${videos[index].views} مشاهدة`;
            }
        }

        // --- نظام الإعجابات والتفاعل ---
        window.handleLike = function(id) {
            let videos = getVideosData();
            const index = videos.findIndex(v => v.id === id);
            if (index !== -1) {
                // محاكاة Toggle للإعجاب
                const btn = document.querySelector(`video[data-id="${id}"]`).closest('.video-card').querySelector('.like-btn');
                
                if (btn.classList.contains('liked')) {
                    videos[index].likes -= 1;
                    btn.classList.remove('liked');
                } else {
                    videos[index].likes += 1;
                    btn.classList.add('liked');
                }
                
                saveVideosData(videos);
                btn.querySelector('.like-count').innerText = videos[index].likes;
            }
        }

        // --- نظام حذف الفيديو ---
        window.handleDelete = function(id) {
            if (confirm("هل أنت متأكد من رغبتك في حذف هذا الفيديو؟")) {
                let videos = getVideosData();
                videos = videos.filter(v => v.id !== id);
                saveVideosData(videos);
                
                // حذف الـ Blob من الذاكرة المؤقتة لتوظيف موارد الجهاز
                if (sessionVideoFiles[id]) {
                    URL.revokeObjectURL(sessionVideoFiles[id]);
                    delete sessionVideoFiles[id];
                }
                
                renderVideos(searchBar.value);
            }
        }

        // --- التعامل مع المدخلات والـ Modals ---
        openModalBtn.addEventListener('click', () => modalOverlay.classList.add('active'));
        closeModalBtn.addEventListener('click', () => {
            modalOverlay.classList.remove('active');
            uploadForm.reset();
            fileLabel.innerText = "اضغط هنا واشترِ ملف فيديو من جهازك";
        });

        // تسهيل عملية اختيار الملفات داخل منطقة السحب
        dropArea.addEventListener('click', () => videoFileInput.click());
        videoFileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileLabel.innerText = `تم اختيار: ${e.target.files[0].name}`;
            }
        });

        // --- معالجة نموذج الرفع واستخراج الـ Blob وعمل الـ Loading ---
        uploadForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const file = videoFileInput.files[0];
            const title = document.getElementById('videoTitle').value;
            const desc = document.getElementById('videoDesc').value;

            if (!file) return;

            // إظهار واجهة التحميل الوهمية لتعزيز تجربة المستخدم الاحترافية
            loadingOverlay.classList.add('active');

            setTimeout(() => {
                const uniqueId = 'user-' + Date.now();
                
                // تحويل الفيديو إلى Object URL محلي ليعمل بكفاءة وسرعة بالمتصفح
                const objectUrl = URL.createObjectURL(file);
                sessionVideoFiles[uniqueId] = objectUrl;

                // إعداد الميتا داتا لحفظها بالـ LocalStorage
                const newVideoMeta = {
                    id: uniqueId,
                    title: title,
                    desc: desc,
                    videoUrl: "", // سيبقى فارغاً لأنه محلي وتتم قراءته من مصفوفة الجلسة الحالية
                    likes: 0,
                    views: 0,
                    isDefault: false
                };

                const currentVideos = getVideosData();
                currentVideos.unshift(newVideoMeta); // إضافة الفيديو الجديد في البداية
                saveVideosData(currentVideos);

                // إغلاق المودال وإنهاء واجهة التحميل
                loadingOverlay.classList.remove('active');
                modalOverlay.classList.remove('active');
                uploadForm.reset();
                fileLabel.innerText = "اضغط هنا واشترِ ملف فيديو من جهازك";

                // إعادة تحديث عرض الفيديوهات بالصفحة الرئيسية
                renderVideos();
            }, 1500); // 1.5 ثانية تأثير تحميل واقعي لمظهر المحترفين
        });

        // --- البحث الفوري السلس وحيوي ---
        searchBar.addEventListener('input', (e) => {
            renderVideos(e.target.value);
        });

        // تشغيل البناء الأولي للموقع عند التحميل لأول مرة
        document.addEventListener('DOMContentLoaded', () => {
            renderVideos();
        });
    </script>
</body>
</html>
